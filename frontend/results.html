<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment Results - Intelligent Stress Support</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container">
  <div class="card" id="result-card"><p class="muted">Loading...</p></div>
  <div class="card">
    <h3>Personalized Recommendations</h3>
    <p class="muted">Generated by the Recommendation Subsystem: collaborative filtering against other users'
      rated interventions, falling back to content-based matching on your severity/category until enough
      rating history exists.</p>
    <div id="recommendations"><p class="muted">Loading...</p></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
Auth.requireAuth();

const params = new URLSearchParams(window.location.search);
const assessmentId = params.get("id");

if (!assessmentId) {
  document.getElementById("result-card").innerHTML = `<div class="alert error">No assessment specified.</div>`;
} else {
  loadResult();
  loadRecommendations();
}

async function loadResult() {
  const card = document.getElementById("result-card");
  try {
    const a = await Api.get(`/assessment/${assessmentId}`);
    card.innerHTML = `
      <h2>Assessment Result</h2>
      <p class="muted">${formatDate(a.assessment_date)}</p>
      <div class="grid-3">
        <div class="stat"><div class="value">${a.total_score}</div><div class="label">Total score (0-30)</div></div>
        <div class="stat"><div class="value"><span class="${severityBadgeClass(a.severity_level)}">${a.severity_level}</span></div><div class="label">Stress severity</div></div>
        <div class="stat"><div class="value">${escapeHtml(a.stress_category)}</div><div class="label">Dominant category</div></div>
      </div>`;
  } catch (err) {
    card.innerHTML = `<div class="alert error">${escapeHtml(err.message)}</div>`;
  }
}

async function loadRecommendations() {
  const el = document.getElementById("recommendations");
  try {
    const recs = await Api.get(`/recommendations/${assessmentId}`);
    if (!recs.length) {
      el.innerHTML = `<p class="muted">No recommendations available.</p>`;
      return;
    }
    el.innerHTML = recs.map(r => `
      <div class="rec-card" data-intervention-id="${r.intervention_id}">
        <div class="meta">${escapeHtml(r.intervention_type)} &middot; for ${escapeHtml(r.target_severity)} severity
          &middot; via ${r.recommended_via === "collaborative_filtering" ? "collaborative filtering" : "content match"}</div>
        <strong>${escapeHtml(r.intervention_name)}</strong>
        <p class="muted" style="margin:0.4rem 0;">${escapeHtml(r.description || "")}</p>
        <div>
          Rate this:
          <span class="rating-stars" data-value="0">
            ${[1,2,3,4,5].map(v => `<span data-star="${v}">&#9733;</span>`).join("")}
          </span>
          <span class="muted rating-status"></span>
        </div>
      </div>`).join("");

    el.querySelectorAll(".rec-card").forEach(card => {
      const interventionId = card.dataset.interventionId;
      const starsWrap = card.querySelector(".rating-stars");
      const status = card.querySelector(".rating-status");
      const stars = starsWrap.querySelectorAll("[data-star]");

      function paint(value) {
        stars.forEach(s => s.classList.toggle("active", parseInt(s.dataset.star) <= value));
      }

      stars.forEach(s => {
        s.addEventListener("click", async () => {
          const value = parseInt(s.dataset.star);
          paint(value);
          status.textContent = "Saving...";
          try {
            await Api.post("/recommendations/rate", {
              intervention_id: parseInt(interventionId),
              assessment_id: parseInt(assessmentId),
              rating: value,
            });
            status.textContent = "Thanks for your feedback!";
          } catch (err) {
            status.textContent = err.message;
          }
        });
      });
    });
  } catch (err) {
    el.innerHTML = `<div class="alert error">${escapeHtml(err.message)}</div>`;
  }
}
</script>
</body>
</html>
