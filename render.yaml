services:
  - type: web
    name: stress-support
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    preDeployCommand: python init_db.py
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      # Paste your Neon connection string here, or set it in the Render
      # dashboard under Environment after first creating the service.
      # Format: postgresql://user:pass@ep-xxx.region.aws.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ADMIN_PASSWORD
        sync: false
