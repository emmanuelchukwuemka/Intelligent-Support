databases:
  - name: stress-support-db
    databaseName: stress_support
    plan: free

services:
  - type: web
    name: stress-support
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    preDeployCommand: python init_db.py
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stress-support-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ADMIN_PASSWORD
        sync: false
