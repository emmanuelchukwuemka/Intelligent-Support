<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment History - Intelligent Stress Support</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container">
  <div class="card">
    <h2>Assessment History</h2>
    <div id="history-table"><p class="muted">Loading...</p></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script>
Auth.requireAuth();

async function load() {
  const el = document.getElementById("history-table");
  try {
    const history = await Api.get("/assessment/history");
    if (!history.length) {
      el.innerHTML = `<p class="muted">No assessments yet. <a href="assessment.html">Take one now</a>.</p>`;
      return;
    }
    const rows = history.map(a => `
      <tr>
        <td>${formatDate(a.assessment_date)}</td>
        <td>${a.total_score}</td>
        <td><span class="${severityBadgeClass(a.severity_level)}">${a.severity_level}</span></td>
        <td>${escapeHtml(a.stress_category || "")}</td>
        <td><a href="results.html?id=${a.assessment_id}">View</a></td>
      </tr>`).join("");
    el.innerHTML = `
      <table>
        <thead><tr><th>Date</th><th>Score</th><th>Severity</th><th>Category</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (err) {
    el.innerHTML = `<div class="alert error">${escapeHtml(err.message)}</div>`;
  }
}
load();
</script>
</body>
</html>
