<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users - Admin</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="container">
  <div class="card">
    <h2>Manage Users</h2>
    <div id="alert-box"></div>
    <div id="users-table"><p class="muted">Loading...</p></div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script>window.SITE_ROOT = "../";</script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script>
Auth.requireAdmin();
const me = Auth.getUser();

async function load() {
  const el = document.getElementById("users-table");
  try {
    const users = await Api.get("/admin/users");
    el.innerHTML = `
      <table>
        <thead><tr><th>Username</th><th>Email</th><th>Full name</th><th>Assessments</th><th>Role</th><th>Joined</th><th></th></tr></thead>
        <tbody>
          ${users.map(u => `
            <tr data-id="${u.user_id}">
              <td>${escapeHtml(u.username)}</td>
              <td>${escapeHtml(u.email)}</td>
              <td>${escapeHtml(u.full_name || "")}</td>
              <td>${u.assessment_count}</td>
              <td>
                <select class="role-select" ${u.user_id === me.user_id ? "disabled" : ""}>
                  <option value="user" ${u.role === "user" ? "selected" : ""}>user</option>
                  <option value="admin" ${u.role === "admin" ? "selected" : ""}>admin</option>
                </select>
              </td>
              <td>${formatDate(u.created_at)}</td>
              <td>
                ${u.user_id === me.user_id ? "" : `<button class="btn small danger delete-btn">Delete</button>`}
              </td>
            </tr>`).join("")}
        </tbody>
      </table>`;

    el.querySelectorAll("tr[data-id]").forEach(row => {
      const userId = row.dataset.id;
      const roleSelect = row.querySelector(".role-select");
      roleSelect.addEventListener("change", async () => {
        try {
          await Api.patch(`/admin/users/${userId}/role`, { role: roleSelect.value });
          showAlert(document.getElementById("alert-box"), "Role updated.", "success");
        } catch (err) {
          showAlert(document.getElementById("alert-box"), err.message, "error");
        }
      });
      const deleteBtn = row.querySelector(".delete-btn");
      if (deleteBtn) {
        deleteBtn.addEventListener("click", async () => {
          if (!confirm("Delete this user and all their data? This cannot be undone.")) return;
          try {
            await Api.del(`/admin/users/${userId}`);
            row.remove();
          } catch (err) {
            showAlert(document.getElementById("alert-box"), err.message, "error");
          }
        });
      }
    });
  } catch (err) {
    el.innerHTML = `<div class="alert error">${escapeHtml(err.message)}</div>`;
  }
}
load();
</script>
</body>
</html>
